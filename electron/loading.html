<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>U2 Collective CRM</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .shell {
        width: 420px;
        padding: 36px;
        text-align: center;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      }

      .mark {
        display: inline-grid;
        width: 72px;
        height: 72px;
        place-items: center;
        margin-bottom: 18px;
        border-radius: 20px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        font-size: 28px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #64748b;
        font-size: 14px;
      }

      .bar {
        height: 6px;
        width: 100%;
        margin-top: 24px;
        overflow: hidden;
        border-radius: 999px;
        background: #e2e8f0;
      }

      .bar::before {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: #2563eb;
        animation: load 1.25s ease-in-out infinite;
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark">U2</div>
      <h1>U2 Collective CRM</h1>
      <p>Starting local database and CRM services...</p>
      <div class="bar"></div>
    </main>
  </body>
</html>
